name: CI/CD Profissional Expo TMDB

on:
  push:
    branches: ["release"]
  pull_request:
    types: [opened, synchronize]
    branches: ["release"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ETAPA 1: Matrix Testing
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test

  # ETAPA 2: Build Web
  build-web:
    needs: test
    if: github.event_name == 'push' # CD ocorre apenas no push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci
      - name: Create .env file
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env
      - name: Expo Web Build
        run: npx expo export --platform web
      - name: Bypass Jekyll on GitHub Pages
        run: touch dist/.nojekyll
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ETAPA 3: Build Android (APK)
  build-android:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"
      - name: Create .env file
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env
      - name: Expo Prebuild
        run: npx expo prebuild --platform android
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

  # ETAPA BÔNUS: Docker Hub, Tags dinâmicas e Multi-arch
  docker-delivery:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Geração de Tag dinâmica com os 7 primeiros caracteres do SHA
      - name: Generate Tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      # Configuração para Build Multi-arquitetura (QEMU + Buildx)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build e Push com Action Oficial (Latest + SHA)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/expo-tmdb:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/expo-tmdb:${{ steps.generate_tag.outputs.sha }}

  # ETAPA FINAL: GitHub Release
  create-release:
    needs: [build-android, deploy-web, docker-delivery]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release Expo v${{ github.run_number }}
          files: app-release.apk
          body: |
            Build automático concluído com sucesso.
            - Versão Web: Disponível no GitHub Pages.
            - Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/expo-tmdb:latest
            - APK: Anexado abaixo.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
