name: CI/CD Expo TMDB

on:
  push:
    branches: ["release"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci

      # O Expo exige o prefixo EXPO_PUBLIC_ para expor variáveis ao frontend
      - name: Create .env file
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Expo Web Build
        run: npx expo export --platform web

      - name: Bypass Jekyll on GitHub Pages
        run: touch dist/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nas versões recentes do Expo, a exportação gera a pasta 'dist'
          # Se usar versão antiga (export:web), altere para 'web-build'
          path: ./dist

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Create .env file
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      # Esta é a etapa crucial do Expo: gera a pasta /android dinamicamente
      - name: Expo Prebuild (Generate Native Code)
        run: npx expo prebuild --platform android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    needs: [build-android, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: app-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release Expo v${{ github.run_number }}
          files: app-release.apk
          body: "Build automático da aplicação Expo TMDB. Versão Web publicada no GitHub Pages."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
