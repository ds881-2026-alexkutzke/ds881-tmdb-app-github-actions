name: TESTE CI

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node.js @20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Test
        run: npm test